<div class="auth-form-wrap logout-wrap" @fadeInUp>
  <div class="logout-icon-badge">
    <mat-icon>logout</mat-icon>
  </div>

  <h2 class="auth-form__title">{{ 'AUTH.LOGOUT.TITLE' | translate }}</h2>
  <p class="auth-form__subtitle">{{ 'AUTH.LOGOUT.MESSAGE' | translate }}</p>

  <div class="logout-status">
    <div class="logout-status__success">
      <mat-icon>check_circle</mat-icon>
    </div>

    <mat-progress-bar mode="indeterminate" class="logout-status__bar"></mat-progress-bar>

    <div class="logout-status__countdown">
      <mat-icon>schedule</mat-icon>
      <span>{{ 'AUTH.LOGOUT.REDIRECT_IN' | translate : { seconds: countdownSeconds } }}</span>
    </div>
  </div>
</div>
