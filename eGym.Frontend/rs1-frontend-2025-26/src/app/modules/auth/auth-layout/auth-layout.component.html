<div class="auth-split">
  <aside class="auth-hero">
    <div class="auth-hero__overlay"></div>
    <div class="auth-hero__content">
      <mat-icon class="auth-hero__icon">fitness_center</mat-icon>
      <h1 class="auth-hero__brand">eGym</h1>
      <p class="auth-hero__tagline">{{ 'AUTH.HERO_TAGLINE' | translate }}</p>
    </div>
  </aside>

  <main class="auth-panel">
    <div class="auth-panel__toolbar">
      <app-locale-theme-toolbar></app-locale-theme-toolbar>
    </div>
    <div class="auth-panel__body">
      <div class="route-outlet-host route-outlet-host--auth">
        <router-outlet #outlet="outlet"></router-outlet>
      </div>
    </div>
  </main>
</div>
